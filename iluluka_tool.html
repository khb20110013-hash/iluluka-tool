<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:sans-serif;font-size:14px;}
#app{max-width:960px;margin:0 auto;padding:10px;}
.header{background:linear-gradient(135deg,#0d47a1,#1565c0);color:white;padding:14px 18px;border-radius:8px;margin-bottom:8px;}
.header h1{font-size:20px;font-weight:bold;}
.header p{font-size:12px;opacity:.85;margin-top:2px;}
.tabs{display:flex;background:#e0e0e0;border-radius:6px 6px 0 0;flex-wrap:wrap;}
.tab-btn{padding:8px 14px;cursor:pointer;border:none;background:#e8e8e8;border-bottom:2px solid transparent;font-weight:normal;color:#555;font-size:13px;}
.tab-btn.active{background:#fff;border-bottom:2px solid #1565c0;font-weight:bold;color:#1565c0;}
.tab-content{background:white;border-radius:0 0 8px 8px;padding:14px;min-height:400px;}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center;}
.filters input,.filters select{padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;}
.filters input{width:160px;}
.cnt{font-size:12px;color:#888;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;}
.card{border:1px solid #ddd;border-radius:6px;padding:8px;cursor:pointer;background:#fafafa;}
.card.captured{background:#e8f5e9;}
.card.selected{border:2px solid #1565c0;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.fam-badge{padding:1px 5px;border-radius:3px;font-size:10px;font-weight:bold;}
.chk-label{display:flex;align-items:center;gap:2px;font-size:11px;cursor:pointer;}
.card-name{font-weight:bold;font-size:13px;}
.card-detail{margin-top:6px;font-size:11px;color:#555;line-height:1.8;}
.card-detail p{margin:0;}
.add-btn{margin-top:5px;padding:3px 10px;font-size:11px;background:#1565c0;color:white;border:none;border-radius:3px;cursor:pointer;}
.ranch-info{margin-bottom:8px;font-size:13px;color:#555;}
.ranch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;}
.ranch-card{border:1px solid #ddd;border-radius:6px;padding:8px;}
.ranch-card.male{background:#e3f2fd;}
.ranch-card.female{background:#fce4ec;}
.ranch-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.gender-btn{padding:1px 6px;font-size:11px;color:white;border:none;border-radius:3px;cursor:pointer;}
.gender-btn.male{background:#1565c0;}
.gender-btn.female{background:#c2185b;}
.ranch-name{font-weight:bold;font-size:13px;margin-bottom:4px;}
.del-btn{padding:2px 6px;font-size:11px;background:#c62828;color:white;border:none;border-radius:3px;cursor:pointer;}
.key-form{background:#f5f5f5;border-radius:6px;padding:12px;margin-bottom:12px;}
.key-form h3{font-weight:bold;font-size:13px;margin-bottom:8px;}
.key-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.key-row input{padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;}
.key-row input:first-child{flex:1;min-width:130px;}
.key-row input:last-child{flex:2;min-width:200px;}
.key-bottom{display:flex;gap:6px;}
.key-bottom textarea{padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;flex:1;min-height:50px;resize:vertical;}
.key-btns{display:flex;flex-direction:column;gap:4px;}
.save-btn{padding:5px 14px;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;}
.save-btn.add{background:#6a1b9a;}
.save-btn.upd{background:#e65100;}
.cancel-btn{padding:5px 14px;background:#757575;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;}
.key-card{border:1px solid #ce93d8;border-radius:6px;padding:10px;margin-bottom:8px;background:#f3e5f5;}
.key-card-inner{display:flex;justify-content:space-between;align-items:flex-start;}
.key-card-body{flex:1;}
.key-card-name{font-weight:bold;font-size:14px;margin-bottom:4px;}
.monster-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.monster-tag{background:#e1bee7;border:1px solid #ce93d8;border-radius:3px;padding:1px 7px;font-size:11px;}
.key-memo{font-size:12px;color:#555;background:white;border:1px solid #eee;border-radius:4px;padding:4px 8px;white-space:pre-wrap;}
.key-actions{display:flex;flex-direction:column;gap:4px;margin-left:8px;}
.edit-btn{padding:2px 7px;font-size:11px;background:#1565c0;color:white;border:none;border-radius:3px;cursor:pointer;}
.empty{color:#aaa;text-align:center;padding:40px;}
</style>

function dc(v){return typeof v==="number"?FAM[v]:v;}
const MS=RAW.map(([n,fi,br,mt,sk],i)=>({id:i+1,name:n,family:FAM[fi],breed:dc(br),mate:dc(mt),skills:sk}));

// --- State ---
const ST={
  tab:"図鑑",
  cap:lsGet("iluluka_cap",{}),
  ranch:lsGet("iluluka_ranch",[]),
  keys:lsGet("iluluka_keys",[]),
  flt:"全て", fam:"全て", q:"", sel:null,
  kn:"", km:"", kme:"", kid:null
};

function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSave(){
  try{localStorage.setItem("iluluka_cap",JSON.stringify(ST.cap));}catch{}
  try{localStorage.setItem("iluluka_ranch",JSON.stringify(ST.ranch));}catch{}
  try{localStorage.setItem("iluluka_keys",JSON.stringify(ST.keys));}catch{}
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(){
  const cnt=Object.values(ST.cap).filter(Boolean).length;
  document.querySelector(".header p").textContent=
    "DQモンスターズ２ GB版 ／ 全"+MS.length+"体 ／ 仲間: "+cnt+"体 ("+Math.round(cnt/MS.length*100)+"%)";

  // tabs
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.tab===ST.tab);
  });

  // content
  const content=document.getElementById("content");
  if(ST.tab==="図鑑") renderZukan(content);
  else if(ST.tab==="牧場") renderRanch(content);
  else renderKeys(content);
}

function getList(){
  return MS.filter(m=>{
    if(ST.flt==="仲間"&&!ST.cap[m.id]) return false;
    if(ST.flt==="未入手"&&ST.cap[m.id]) return false;
    if(ST.fam!=="全て"&&m.family!==ST.fam) return false;
    if(ST.q&&!m.name.includes(ST.q)) return false;
    return true;
  });
}

function renderZukan(el){
  const list=getList();
  const famOpts=["全系統",...FAM].map(f=>{
    const val=f==="全系統"?"全て":f;
    return `<option value="${esc(val)}"${ST.fam===val?" selected":""}>${esc(f)}</option>`;
  }).join("");

  let cards="";
  if(list.length===0){
    cards=`<div class="empty">該当なし</div>`;
  } else {
    cards=list.map(m=>{
      const bg=FC[m.family]||"#eee";
      const isCap=!!ST.cap[m.id];
      const isSel=ST.sel===m.id;
      let detail="";
      if(isSel){
        detail=`<div class="card-detail">
          <p>🧬 血統: ${esc(m.breed)}</p>
          <p>💑 相手: ${esc(m.mate)}</p>
          <p>✨ 特技: ${esc(m.skills)}</p>
          <button class="add-btn" onclick="addRanch(${m.id})">牧場に追加</button>
        </div>`;
      }
      return `<div class="card${isCap?" captured":""}${isSel?" selected":""}" id="card-${m.id}">
        <div class="card-top">
          <span class="fam-badge" style="background:${bg}">${esc(m.family)}</span>
          <label class="chk-label" onclick="event.stopPropagation()">
            <input type="checkbox"${isCap?" checked":""} onchange="toggleCap(${m.id})"> 仲間
          </label>
        </div>
        <div class="card-name" onclick="toggleSel(${m.id})">${esc(m.name)}</div>
        ${detail}
      </div>`;
    }).join("");
  }

  el.innerHTML=`
    <div class="filters">
      <input type="text" placeholder="🔍 モンスター名" value="${esc(ST.q)}" oninput="setQ(this.value)">
      <select onchange="setFlt(this.value)">
        <option${ST.flt==="全て"?" selected":""}>全て</option>
        <option${ST.flt==="仲間"?" selected":""}>仲間</option>
        <option${ST.flt==="未入手"?" selected":""}>未入手</option>
      </select>
      <select onchange="setFam(this.value)">${famOpts}</select>
      <span class="cnt">${list.length}体</span>
    </div>
    <div class="grid">${cards}</div>`;
}

function renderRanch(el){
  let cards="";
  if(ST.ranch.length===0){
    cards=`<div class="empty">まだモンスターがいません</div>`;
  } else {
    cards=ST.ranch.map(r=>{
      const bg=FC[r.family]||"#eee";
      const isMale=r.gender==="オス";
      return `<div class="ranch-card ${isMale?"male":"female"}">
        <div class="ranch-top">
          <span class="fam-badge" style="background:${bg}">${esc(r.family)}</span>
          <button class="gender-btn ${isMale?"male":"female"}" onclick="togGender('${r.iid}')">${esc(r.gender)}</button>
        </div>
        <div class="ranch-name">${esc(r.name)}</div>
        <button class="del-btn" onclick="removeRanch('${r.iid}')">削除</button>
      </div>`;
    }).join("");
  }
  el.innerHTML=`
    <div class="ranch-info">牧場 ${ST.ranch.length}/30匹｜図鑑から「牧場に追加」で登録</div>
    <div class="ranch-grid">${cards}</div>`;
}

function renderKeys(el){
  const isEdit=!!ST.kid;
  let keyCards="";
  if(ST.keys.length===0){
    keyCards=`<div class="empty">かぎが登録されていません</div>`;
  } else {
    keyCards=ST.keys.map(k=>{
      const tags=k.monsters
        ? k.monsters.split(/[,、，]/).filter(m=>m.trim()).map(m=>`<span class="monster-tag">${esc(m.trim())}</span>`).join("")
        : "";
      const memo=k.memo ? `<div class="key-memo">📝 ${esc(k.memo)}</div>` : "";
      return `<div class="key-card">
        <div class="key-card-inner">
          <div class="key-card-body">
            <div class="key-card-name">🗝️ ${esc(k.name)}</div>
            ${tags?`<div class="monster-tags">${tags}</div>`:""}
            ${memo}
          </div>
          <div class="key-actions">
            <button class="edit-btn" onclick="startEditKey(${k.id})">編集</button>
            <button class="del-btn" onclick="deleteKey(${k.id})">削除</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  el.innerHTML=`
    <div class="key-form">
      <h3>🗝️ ${isEdit?"かぎを編集":"かぎを登録"}</h3>
      <div class="key-row">
        <input type="text" placeholder="かぎの名前*" value="${esc(ST.kn)}" oninput="ST.kn=this.value" id="kn-input">
        <input type="text" placeholder="出るモンスター（カンマ区切り）" value="${esc(ST.km)}" oninput="ST.km=this.value" id="km-input">
      </div>
      <div class="key-bottom">
        <textarea placeholder="メモ" oninput="ST.kme=this.value" id="kme-input">${esc(ST.kme)}</textarea>
        <div class="key-btns">
          <button class="save-btn ${isEdit?"upd":"add"}" onclick="saveKey()">${isEdit?"更新":"登録"}</button>
          ${isEdit?`<button class="cancel-btn" onclick="cancelEditKey()">取消</button>`:""}
        </div>
      </div>
    </div>
    ${keyCards}`;
}

// --- Actions ---
function setQ(v){ST.q=v;ST.sel=null;render();}
function setFlt(v){ST.flt=v;ST.sel=null;render();}
function setFam(v){ST.fam=v;ST.sel=null;render();}
function toggleSel(id){ST.sel=(ST.sel===id?null:id);render();}
function toggleCap(id){ST.cap[id]=!ST.cap[id];lsSave();render();}

function addRanch(id){
  if(ST.ranch.length>=30){alert("牧場は最大30匹です");return;}
  const m=MS.find(x=>x.id===id);
  if(!m)return;
  ST.ranch.push({...m,iid:String(Date.now()+Math.random()),gender:"オス"});
  lsSave();render();
}
function togGender(iid){
  const r=ST.ranch.find(x=>x.iid===iid);
  if(r)r.gender=(r.gender==="オス"?"メス":"オス");
  lsSave();render();
}
function removeRanch(iid){
  ST.ranch=ST.ranch.filter(x=>x.iid!==iid);
  lsSave();render();
}

function saveKey(){
  if(!ST.kn)return;
  if(ST.kid){
    const k=ST.keys.find(x=>x.id===ST.kid);
    if(k){k.name=ST.kn;k.monsters=ST.km;k.memo=ST.kme;}
    ST.kid=null;
  } else {
    ST.keys.push({id:Date.now(),name:ST.kn,monsters:ST.km,memo:ST.kme});
  }
  ST.kn="";ST.km="";ST.kme="";
  lsSave();render();
}
function startEditKey(id){
  const k=ST.keys.find(x=>x.id===id);
  if(!k)return;
  ST.kid=id;ST.kn=k.name;ST.km=k.monsters||"";ST.kme=k.memo||"";
  render();
}
function cancelEditKey(){
  ST.kid=null;ST.kn="";ST.km="";ST.kme="";
  render();
}
function deleteKey(id){
  ST.keys=ST.keys.filter(x=>x.id!==id);
  lsSave();render();
}

// --- Init ---
document.getElementById("app").innerHTML=`
  <div class="header">
    <h1>🐉 GB版イルルカ 攻略ツール</h1>
    <p></p>
  </div>
  <div class="tabs">
    <button class="tab-btn" data-tab="図鑑" onclick="ST.tab='図鑑';render()">図鑑</button>
    <button class="tab-btn" data-tab="牧場" onclick="ST.tab='牧場';render()">牧場</button>
    <button class="tab-btn" data-tab="ふしぎなかぎ" onclick="ST.tab='ふしぎなかぎ';render()">ふしぎなかぎ</button>
  </div>
  <div class="tab-content" id="content"></div>`;

render();
</script>
</body>
</html>
