["茫聝聣茫聝录茫聜炉",10,"-","-","茫聜庐茫聝漏茫聝禄茫聜陇茫聜陋茫聝禄茫聛隆茫聛聥茫聜聣茫聜聮茫聛聼茫聜聛茫聜聥"],
];

function dc(v){return typeof v==="number"?FAM[v]:v;}
const MS=RAW.map(([n,fi,br,mt,sk],i)=>({id:i+1,name:n,family:FAM[fi],breed:dc(br),mate:dc(mt),skills:sk}));

// --- State ---
const ST={
  tab:"氓聸鲁茅聭聭",
  cap:lsGet("iluluka_cap",{}),
  ranch:lsGet("iluluka_ranch",[]),
  keys:lsGet("iluluka_keys",[]),
  flt:"氓聟篓茫聛娄", fam:"氓聟篓茫聛娄", q:"", sel:null,
  kn:"", km:"", kme:"", kid:null
};

function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSave(){
  try{localStorage.setItem("iluluka_cap",JSON.stringify(ST.cap));}catch{}
  try{localStorage.setItem("iluluka_ranch",JSON.stringify(ST.ranch));}catch{}
  try{localStorage.setItem("iluluka_keys",JSON.stringify(ST.keys));}catch{}
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(){
  const cnt=Object.values(ST.cap).filter(Boolean).length;
  document.querySelector(".header p").textContent=
    "DQ茫聝垄茫聝鲁茫聜鹿茫聜驴茫聝录茫聜潞茂录聮 GB莽聣聢 茂录聫 氓聟篓"+MS.length+"盲陆聯 茂录聫 盲禄虏茅聳聯: "+cnt+"盲陆聯 ("+Math.round(cnt/MS.length*100)+"%)";

  // tabs
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.tab===ST.tab);
  });

  // content
  const content=document.getElementById("content");
  if(ST.tab==="氓聸鲁茅聭聭") renderZukan(content);
  else if(ST.tab==="莽聣搂氓聽麓") renderRanch(content);
  else renderKeys(content);
}

function getList(){
  return MS.filter(m=>{
    if(ST.flt==="盲禄虏茅聳聯"&&!ST.cap[m.id]) return false;
    if(ST.flt==="忙聹陋氓聟楼忙聣聥"&&ST.cap[m.id]) return false;
    if(ST.fam!=="氓聟篓茫聛娄"&&m.family!==ST.fam) return false;
    if(ST.q&&!m.name.includes(ST.q)) return false;
    return true;
  });
}

function renderZukan(el){
  const list=getList();
  const famOpts=["氓聟篓莽鲁禄莽碌卤",...FAM].map(f=>{
    const val=f==="氓聟篓莽鲁禄莽碌卤"?"氓聟篓茫聛娄":f;
    return `<option value="${esc(val)}"${ST.fam===val?" selected":""}>${esc(f)}</option>`;
  }).join("");

  let cards="";
  if(list.length===0){
    cards=`<div class="empty">猫漏虏氓陆聯茫聛陋茫聛聴</div>`;
  } else {
    cards=list.map(m=>{
      const bg=FC[m.family]||"#eee";
      const isCap=!!ST.cap[m.id];
      const isSel=ST.sel===m.id;
      let detail="";
      if(isSel){
        detail=`<div class="card-detail">
          <p>冒聼搂卢 猫隆聙莽碌卤: ${esc(m.breed)}</p>
          <p>冒聼聮聭 莽聸赂忙聣聥: ${esc(m.mate)}</p>
          <p>芒聹篓 莽聣鹿忙聤聙: ${esc(m.skills)}</p>
          <button class="add-btn" onclick="addRanch(${m.id})">莽聣搂氓聽麓茫聛芦猫驴陆氓聤聽</button>
        </div>`;
      }
      return `<div class="card${isCap?" captured":""}${isSel?" selected":""}" id="card-${m.id}">
        <div class="card-top">
          <span class="fam-badge" style="background:${bg}">${esc(m.family)}</span>
          <label class="chk-label" onclick="event.stopPropagation()">
            <input type="checkbox"${isCap?" checked":""} onchange="toggleCap(${m.id})"> 盲禄虏茅聳聯
          </label>
        </div>
        <div class="card-name" onclick="toggleSel(${m.id})">${esc(m.name)}</div>
        ${detail}
      </div>`;
    }).join("");
  }

  el.innerHTML=`
    <div class="filters">
      <input type="text" placeholder="冒聼聰聧 茫聝垄茫聝鲁茫聜鹿茫聜驴茫聝录氓聬聧" value="${esc(ST.q)}" oninput="setQ(this.value)">
      <select onchange="setFlt(this.value)">
        <option${ST.flt==="氓聟篓茫聛娄"?" selected":""}>氓聟篓茫聛娄</option>
        <option${ST.flt==="盲禄虏茅聳聯"?" selected":""}>盲禄虏茅聳聯</option>
        <option${ST.flt==="忙聹陋氓聟楼忙聣聥"?" selected":""}>忙聹陋氓聟楼忙聣聥</option>
      </select>
      <select onchange="setFam(this.value)">${famOpts}</select>
      <span class="cnt">${list.length}盲陆聯</span>
    </div>
    <div class="grid">${cards}</div>`;
}

function renderRanch(el){
  let cards="";
  if(ST.ranch.length===0){
    cards=`<div class="empty">茫聛戮茫聛聽茫聝垄茫聝鲁茫聜鹿茫聜驴茫聝录茫聛聦茫聛聞茫聛戮茫聛聸茫聜聯</div>`;
  } else {
    cards=ST.ranch.map(r=>{
      const bg=FC[r.family]||"#eee";
      const isMale=r.gender==="茫聜陋茫聜鹿";
      return `<div class="ranch-card ${isMale?"male":"female"}">
        <div class="ranch-top">
          <span class="fam-badge" style="background:${bg}">${esc(r.family)}</span>
          <button class="gender-btn ${isMale?"male":"female"}" onclick="togGender('${r.iid}')">${esc(r.gender)}</button>
        </div>
        <div class="ranch-name">${esc(r.name)}</div>
        <button class="del-btn" onclick="removeRanch('${r.iid}')">氓聣聤茅聶陇</button>
      </div>`;
    }).join("");
  }
  el.innerHTML=`
    <div class="ranch-info">莽聣搂氓聽麓 ${ST.ranch.length}/30氓聦鹿茂陆聹氓聸鲁茅聭聭茫聛聥茫聜聣茫聙聦莽聣搂氓聽麓茫聛芦猫驴陆氓聤聽茫聙聧茫聛搂莽聶禄茅聦虏</div>
    <div class="ranch-grid">${cards}</div>`;
}

function renderKeys(el){
  const isEdit=!!ST.kid;
  let keyCards="";
  if(ST.keys.length===0){
    keyCards=`<div class="empty">茫聛聥茫聛聨茫聛聦莽聶禄茅聦虏茫聛聲茫聜聦茫聛娄茫聛聞茫聛戮茫聛聸茫聜聯</div>`;
  } else {
    keyCards=ST.keys.map(k=>{
      const tags=k.monsters
        ? k.monsters.split(/[,茫聙聛茂录聦]/).filter(m=>m.trim()).map(m=>`<span class="monster-tag">${esc(m.trim())}</span>`).join("")
        : "";
      const memo=k.memo ? `<div class="key-memo">冒聼聯聺 ${esc(k.memo)}</div>` : "";
      return `<div class="key-card">
        <div class="key-card-inner">
          <div class="key-card-body">
            <div class="key-card-name">冒聼聴聺茂赂聫 ${esc(k.name)}</div>
            ${tags?`<div class="monster-tags">${tags}</div>`:""}
            ${memo}
          </div>
          <div class="key-actions">
            <button class="edit-btn" onclick="startEditKey(${k.id})">莽路篓茅聸聠</button>
            <button class="del-btn" onclick="deleteKey(${k.id})">氓聣聤茅聶陇</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  el.innerHTML=`
    <div class="key-form">
      <h3>冒聼聴聺茂赂聫 ${isEdit?"茫聛聥茫聛聨茫聜聮莽路篓茅聸聠":"茫聛聥茫聛聨茫聜聮莽聶禄茅聦虏"}</h3>
      <div class="key-row">
        <input type="text" placeholder="茫聛聥茫聛聨茫聛庐氓聬聧氓聣聧*" value="${esc(ST.kn)}" oninput="ST.kn=this.value" id="kn-input">
        <input type="text" placeholder="氓聡潞茫聜聥茫聝垄茫聝鲁茫聜鹿茫聜驴茫聝录茂录聢茫聜芦茫聝鲁茫聝聻氓聦潞氓聢聡茫聜聤茂录聣" value="${esc(ST.km)}" oninput="ST.km=this.value" id="km-input">
      </div>
      <div class="key-bottom">
        <textarea placeholder="茫聝隆茫聝垄" oninput="ST.kme=this.value" id="kme-input">${esc(ST.kme)}</textarea>
        <div class="key-btns">
          <button class="save-btn ${isEdit?"upd":"add"}" onclick="saveKey()">${isEdit?"忙聸麓忙聳掳":"莽聶禄茅聦虏"}</button>
          ${isEdit?`<button class="cancel-btn" onclick="cancelEditKey()">氓聫聳忙露聢</button>`:""}
        </div>
      </div>
    </div>
    ${keyCards}`;
}

// --- Actions ---
function setQ(v){ST.q=v;ST.sel=null;render();}
function setFlt(v){ST.flt=v;ST.sel=null;render();}
function setFam(v){ST.fam=v;ST.sel=null;render();}
function toggleSel(id){ST.sel=(ST.sel===id?null:id);render();}
function toggleCap(id){ST.cap[id]=!ST.cap[id];lsSave();render();}

function addRanch(id){
  if(ST.ranch.length>=30){alert("莽聣搂氓聽麓茫聛炉忙聹聙氓陇搂30氓聦鹿茫聛搂茫聛聶");return;}
  const m=MS.find(x=>x.id===id);
  if(!m)return;
  ST.ranch.push({...m,iid:String(Date.now()+Math.random()),gender:"茫聜陋茫聜鹿"});
  lsSave();render();
}
function togGender(iid){
  const r=ST.ranch.find(x=>x.iid===iid);
  if(r)r.gender=(r.gender==="茫聜陋茫聜鹿"?"茫聝隆茫聜鹿":"茫聜陋茫聜鹿");
  lsSave();render();
}
function removeRanch(iid){
  ST.ranch=ST.ranch.filter(x=>x.iid!==iid);
  lsSave();render();
}

function saveKey(){
  if(!ST.kn)return;
  if(ST.kid){
    const k=ST.keys.find(x=>x.id===ST.kid);
    if(k){k.name=ST.kn;k.monsters=ST.km;k.memo=ST.kme;}
    ST.kid=null;
  } else {
    ST.keys.push({id:Date.now(),name:ST.kn,monsters:ST.km,memo:ST.kme});
  }
  ST.kn="";ST.km="";ST.kme="";
  lsSave();render();
}
function startEditKey(id){
  const k=ST.keys.find(x=>x.id===id);
  if(!k)return;
  ST.kid=id;ST.kn=k.name;ST.km=k.monsters||"";ST.kme=k.memo||"";
  render();
}
function cancelEditKey(){
  ST.kid=null;ST.kn="";ST.km="";ST.kme="";
  render();
}
function deleteKey(id){
  ST.keys=ST.keys.filter(x=>x.id!==id);
  lsSave();render();
}

// --- Init ---
document.getElementById("app").innerHTML=`
  <div class="header">
    <h1>冒聼聬聣 GB莽聣聢茫聜陇茫聝芦茫聝芦茫聜芦 忙聰禄莽聲楼茫聝聞茫聝录茫聝芦</h1>
    <p></p>
  </div>
  <div class="tabs">
    <button class="tab-btn" data-tab="氓聸鲁茅聭聭" onclick="ST.tab='氓聸鲁茅聭聭';render()">氓聸鲁茅聭聭</button>
    <button class="tab-btn" data-tab="莽聣搂氓聽麓" onclick="ST.tab='莽聣搂氓聽麓';render()">莽聣搂氓聽麓</button>
    <button class="tab-btn" data-tab="茫聛碌茫聛聴茫聛聨茫聛陋茫聛聥茫聛聨" onclick="ST.tab='茫聛碌茫聛聴茫聛聨茫聛陋茫聛聥茫聛聨';render()">茫聛碌茫聛聴茫聛聨茫聛陋茫聛聥茫聛聨</button>
  </div>
  <div class="tab-content" id="content"></div>`;

render();
</script>
